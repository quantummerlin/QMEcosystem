<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#0a0015"/>
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#daa520" stroke-width="4"/>
  <!-- Soul symbol - stylised S with infinity loop -->
  <path d="M256 80 C176 80 128 140 128 200 C128 260 176 290 256 310 C336 330 384 360 384 420 C384 460 336 480 256 480 C176 480 128 440 128 400" 
        fill="none" stroke="url(#glow)" stroke-width="28" stroke-linecap="round"/>
  <!-- Top dot / crown -->
  <circle cx="256" cy="80" r="18" fill="#ffd700"/>
  <!-- Bottom dot / anchor -->
  <circle cx="128" cy="400" r="18" fill="#ff6b9d"/>
  <!-- Inner starburst -->
  <polygon points="256,160 268,210 310,210 276,240 288,290 256,260 224,290 236,240 202,210 244,210" fill="#ffd700" opacity="0.8"/>
</svg>
