<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </radialGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#00f5ff" stroke-width="4"/>
  <!-- 40Hz sine wave -->
  <path d="M80 256 Q128 160 176 256 Q224 352 272 256 Q320 160 368 256 Q416 352 432 256" 
        fill="none" stroke="url(#wave)" stroke-width="24" stroke-linecap="round"/>
  <!-- Hz text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="80" font-weight="bold" 
        fill="#00f5ff" text-anchor="middle" letter-spacing="4">40Hz</text>
  <!-- Subtle glow dots at wave peaks -->
  <circle cx="176" cy="256" r="8" fill="#00f5ff" opacity="0.6"/>
  <circle cx="272" cy="256" r="8" fill="#00f5ff" opacity="0.6"/>
  <circle cx="368" cy="256" r="8" fill="#00f5ff" opacity="0.6"/>
</svg>
